<section class="cta-section" style="background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('{background_url}'); background-size: cover; background-position: center;">
    <div class="container">
        <div class="cta-content">
            <h2>{title}</h2>
            <h3><a href="tel:{phone}" class="phone-number">{phone_formatted}</a></h3>
            <a href="{whatsapp_url}" class="cta-button">WhatsApp Quote</a>
        </div>
    </div>
</section>
