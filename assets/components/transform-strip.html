<section class="transform-strip" aria-label="The Maloon difference">

                </div>
                <ul class="transform-strip__traits transform-strip__traits--after">
                    <li><i class="fas fa-check" aria-hidden="true"></i> Fresh, airy, spotless surfaces</li>
                    <li><i class="fas fa-check" aria-hidden="true"></i> Every corner, every time</li>
                    <li><i class="fas fa-check" aria-hidden="true"></i> Eco-friendly, non-toxic products</li>
                </ul>

        </div>
