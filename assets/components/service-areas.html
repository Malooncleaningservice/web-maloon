<section class="service-areas-section">
    <div class="container">
        <div class="section-header">
            <h2>{title}</h2>
            <p>{subtitle}</p>
        </div>

        <div class="areas-map">
            <img src="{map_image}" alt="{map_alt}" style="width: 100%; border-radius: var(--radius); margin-bottom: 20px;">

            <div class="areas-grid">
                <div class="area-column">
                    <ul class="area-list">
                        {area_list_1}
                    </ul>
                </div>
                <div class="area-column">
                    <ul class="area-list">
                        {area_list_2}
                    </ul>
                </div>
                <div class="area-column">
                    <ul class="area-list">
                        {area_list_3}
                    </ul>
                </div>
            </div>
        </div>
    </div>
</section>
