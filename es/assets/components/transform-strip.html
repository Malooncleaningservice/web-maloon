<section class="transform-strip" aria-label="La diferencia Maloon">
    <div class="container">

        <p class="transform-strip__eyebrow">La diferencia Maloon</p>

        <div class="transform-strip__panels">

            <!-- Antes -->
            <div class="transform-strip__panel transform-strip__panel--before">
                <div class="transform-strip__panel-photo">
                    <img
                        src="https://images.unsplash.com/photo-1527515545081-5db817172677?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=70"
                        alt="Una oficina desordenada y polvorienta antes de la limpieza profesional"
                        loading="lazy"
                    />
                    <div class="transform-strip__label transform-strip__label--before">
                        <i class="fas fa-times-circle" aria-hidden="true"></i>
                        Antes
                    </div>
                </div>
                <ul class="transform-strip__traits">
                    <li><i class="fas fa-times" aria-hidden="true"></i> Superficies polvorientas y aire viciado</li>
                    <li><i class="fas fa-times" aria-hidden="true"></i> Esquinas olvidadas y áreas de alto contacto</li>
                    <li><i class="fas fa-times" aria-hidden="true"></i> Olores a químicos agresivos</li>
                </ul>
            </div>

            <!-- Flecha -->
            <div class="transform-strip__arrow" aria-hidden="true">
                <div class="transform-strip__arrow-icon">
                    <i class="fas fa-arrow-right"></i>
                </div>
                <span class="transform-strip__arrow-label">Maloon</span>
            </div>

            <!-- Después -->
            <div class="transform-strip__panel transform-strip__panel--after">
                <div class="transform-strip__panel-photo">
                    <img
                        src="https://images.unsplash.com/photo-1497366216548-37526070297c?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=70"
                        alt="Una oficina limpia y luminosa después de la limpieza profesional de Maloon"
                        loading="lazy"
                    />
                    <div class="transform-strip__label transform-strip__label--after">
                        <i class="fas fa-check-circle" aria-hidden="true"></i>
                        Después
                    </div>
                </div>
                <ul class="transform-strip__traits transform-strip__traits--after">
                    <li><i class="fas fa-check" aria-hidden="true"></i> Superficies frescas, aireadas e impecables</li>
                    <li><i class="fas fa-check" aria-hidden="true"></i> Cada rincón, siempre</li>
                    <li><i class="fas fa-check" aria-hidden="true"></i> Productos ecológicos, no tóxicos</li>
                </ul>
            </div>

        </div>

    </div>
</section>
